<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="740" viewBox="0 0 1320 740">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6f4ee" />
      <stop offset="100%" stop-color="#ece8df" />
    </linearGradient>
    <style>
      .title { font: 700 36px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #1f1f1f; }
      .subtitle { font: 400 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #505050; }
      .band-title { font: 700 28px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #1f1f1f; }
      .band-text { font: 400 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #333333; }
      .small { font: 700 14px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #7a4d29; letter-spacing: 1px; }
      .warn { font: 700 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #8b2f2f; }
    </style>
  </defs>

  <rect x="0" y="0" width="1320" height="740" rx="28" fill="url(#bg)" />
  <text x="72" y="78" class="title">这套方法的边界：浏览器不是执行器</text>
  <text x="72" y="112" class="subtitle">真正稳定的执行层在 API。浏览器只承担学习和鉴权恢复，不能代替业务执行。</text>

  <g transform="translate(78,164)">
    <rect x="0" y="0" width="1164" height="136" rx="28" fill="#f1dcc7" />
    <text x="36" y="40" class="small">第 1 层</text>
    <text x="36" y="84" class="band-title">浏览器学习层</text>
    <text x="252" y="84" class="band-text">识别页面能力、按钮入口、筛选条件、网络请求和鉴权位置。</text>
    <text x="252" y="116" class="band-text">它解决的是“看懂网站”，不是“替网站干活”。</text>
  </g>

  <g transform="translate(78,326)">
    <rect x="0" y="0" width="1164" height="180" rx="28" fill="#dbe8f3" />
    <text x="36" y="40" class="small">第 2 层</text>
    <text x="36" y="84" class="band-title">API 执行层</text>
    <text x="252" y="84" class="band-text">查询、上传、构建、发布、日志分析、重试、错误分类都在这里完成。</text>
    <text x="252" y="116" class="band-text">只有这一层才是最终 skill 的执行核心，也是最稳定、最容易复用的部分。</text>
    <rect x="252" y="130" width="464" height="34" rx="17" fill="#f8fcff" />
    <text x="274" y="153" class="band-text">示例：search logs / upload skill / execute build / publish document</text>
  </g>

  <g transform="translate(78,532)">
    <rect x="0" y="0" width="1164" height="128" rx="28" fill="#dce8d9" />
    <text x="36" y="40" class="small">第 3 层</text>
    <text x="36" y="84" class="band-title">交付与复用层</text>
    <text x="252" y="84" class="band-text">把执行能力整理成 SKILL.md、README、scripts、references 和市场分发。</text>
  </g>

  <g transform="translate(910,44)">
    <rect x="0" y="0" width="318" height="74" rx="18" fill="#fff4f4" />
    <text x="26" y="31" class="warn">不要让浏览器直接做业务执行</text>
    <text x="26" y="55" class="band-text">否则实现会跟着 DOM 一起变脆。</text>
  </g>
</svg>
