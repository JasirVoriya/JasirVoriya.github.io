<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560">
  <defs>
    <linearGradient id="bg2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8f6f1" />
      <stop offset="100%" stop-color="#efebe3" />
    </linearGradient>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2a2a2a" />
    </marker>
    <style>
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #1f1f1f; }
      .subtitle { font: 400 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #4a4a4a; }
      .n { font: 700 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; }
      .t { font: 700 22px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #1f1f1f; }
      .b { font: 400 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #333333; }
    </style>
  </defs>

  <rect x="0" y="0" width="1180" height="560" rx="24" fill="url(#bg2)" />
  <text x="68" y="72" class="title">鉴权恢复闭环</text>
  <text x="68" y="106" class="subtitle">浏览器只负责恢复鉴权。恢复成功后，执行立刻回到 API。</text>

  <g transform="translate(85,190)">
    <circle cx="0" cy="0" r="34" fill="#b66a3a" />
    <text x="-7" y="7" class="n">1</text>
    <text x="56" y="-6" class="t">调用 API</text>
    <text x="56" y="24" class="b">使用 skill 自带的 API 客户端。</text>
  </g>

  <g transform="translate(360,190)">
    <circle cx="0" cy="0" r="34" fill="#9c4d52" />
    <text x="-7" y="7" class="n">2</text>
    <text x="56" y="-6" class="t">识别鉴权失败</text>
    <text x="56" y="24" class="b">401、403、重定向或会话失效。</text>
  </g>

  <g transform="translate(690,190)">
    <circle cx="0" cy="0" r="34" fill="#567c9f" />
    <text x="-7" y="7" class="n">3</text>
    <text x="56" y="-6" class="t">打开浏览器</text>
    <text x="56" y="24" class="b">登录并观察一次成功请求。</text>
  </g>

  <g transform="translate(985,190)">
    <circle cx="0" cy="0" r="34" fill="#4b8662" />
    <text x="-7" y="7" class="n">4</text>
    <text x="56" y="-6" class="t">写入鉴权缓存</text>
    <text x="56" y="24" class="b">把 cookie 和 token 落到 YAML。</text>
  </g>

  <line x1="140" y1="190" x2="305" y2="190" stroke="#2a2a2a" stroke-width="4" marker-end="url(#arrow2)" />
  <line x1="415" y1="190" x2="635" y2="190" stroke="#2a2a2a" stroke-width="4" marker-end="url(#arrow2)" />
  <line x1="745" y1="190" x2="930" y2="190" stroke="#2a2a2a" stroke-width="4" marker-end="url(#arrow2)" />

  <path d="M 985 256 C 985 386 740 456 430 456 C 220 456 110 404 90 330" fill="none" stroke="#2a2a2a" stroke-width="4" marker-end="url(#arrow2)" />

  <g transform="translate(300,400)">
    <rect x="0" y="-56" width="600" height="100" rx="18" fill="#ffffff" opacity="0.86" />
    <text x="24" y="-14" class="t">用新鉴权重试 API</text>
    <text x="24" y="18" class="b">一旦重试成功，运行时链路就不再依赖浏览器。</text>
  </g>
</svg>
