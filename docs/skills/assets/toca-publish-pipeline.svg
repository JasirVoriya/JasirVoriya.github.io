<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="700" viewBox="0 0 1360 700">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7f3ea" />
      <stop offset="100%" stop-color="#ede7dc" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2a2a2a" />
    </marker>
    <style>
      .title { font: 700 36px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #1e1e1e; }
      .subtitle { font: 400 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #505050; }
      .card-title { font: 700 20px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #1f1f1f; }
      .card-text { font: 400 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #333333; }
      .tag { font: 700 13px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #734b2e; letter-spacing: 1px; }
    </style>
  </defs>

  <rect x="0" y="0" width="1360" height="700" rx="28" fill="url(#bg)" />
  <text x="72" y="78" class="title">文档库发布链路</text>
  <text x="72" y="112" class="subtitle">前半段走 API，最后一小段通过编辑器的正式能力落盘。这样既稳定，又能真正发布成功。</text>

  <g transform="translate(86,212)">
    <rect x="0" y="0" width="210" height="176" rx="24" fill="#f1dcc7" />
    <text x="24" y="42" class="tag">输入</text>
    <text x="24" y="88" class="card-title">Markdown 原稿</text>
    <text x="24" y="120" class="card-text">正文、图片引用、</text>
    <text x="24" y="144" class="card-text">Mermaid 代码块。</text>
  </g>

  <g transform="translate(338,212)">
    <rect x="0" y="0" width="232" height="176" rx="24" fill="#dbe8f4" />
    <text x="24" y="42" class="tag">预处理</text>
    <text x="24" y="88" class="card-title">本地渲染与转化</text>
    <text x="24" y="120" class="card-text">把 Mermaid 渲染成 SVG，</text>
    <text x="24" y="144" class="card-text">把本地图片准备成附件。</text>
  </g>

  <g transform="translate(612,212)">
    <rect x="0" y="0" width="228" height="176" rx="24" fill="#dbe8da" />
    <text x="24" y="42" class="tag">API</text>
    <text x="24" y="88" class="card-title">上传附件</text>
    <text x="24" y="120" class="card-text">把图片和 SVG 上传到</text>
    <text x="24" y="144" class="card-text">文档库附件服务。</text>
  </g>

  <g transform="translate(882,212)">
    <rect x="0" y="0" width="230" height="176" rx="24" fill="#e5dff0" />
    <text x="24" y="42" class="tag">生成</text>
    <text x="24" y="88" class="card-title">HTML payload</text>
    <text x="24" y="120" class="card-text">把正文和附件地址组合成</text>
    <text x="24" y="144" class="card-text">最终要落盘的 HTML。</text>
  </g>

  <g transform="translate(1154,212)">
    <rect x="0" y="0" width="126" height="176" rx="24" fill="#efe1d4" />
    <text x="18" y="42" class="tag">输出</text>
    <text x="18" y="88" class="card-title">知识库页面</text>
    <text x="18" y="120" class="card-text">文章、配图</text>
    <text x="18" y="144" class="card-text">和附件齐全。</text>
  </g>

  <line x1="296" y1="300" x2="328" y2="300" stroke="#2a2a2a" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="570" y1="300" x2="602" y2="300" stroke="#2a2a2a" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="840" y1="300" x2="872" y2="300" stroke="#2a2a2a" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="1112" y1="300" x2="1144" y2="300" stroke="#2a2a2a" stroke-width="4" marker-end="url(#arrow)" />

  <g transform="translate(252,470)">
    <rect x="0" y="0" width="860" height="118" rx="26" fill="#ffffff" opacity="0.95" />
    <text x="28" y="40" class="card-title">最后一步为什么还要浏览器参与</text>
    <text x="28" y="72" class="card-text">不是为了点按钮，而是调用页面内编辑器的正式能力：setContent、forceSync 和 snapshot。</text>
    <text x="28" y="98" class="card-text">也就是说，浏览器只是正文落盘的承载器，不是前面整条发布流程的执行主体。</text>
  </g>
</svg>
