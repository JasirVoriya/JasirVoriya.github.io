<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7f3ea" />
      <stop offset="100%" stop-color="#f3efe6" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b2b2b" />
    </marker>
    <style>
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #1f1f1f; }
      .subtitle { font: 400 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #4a4a4a; }
      .card-title { font: 700 24px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #1f1f1f; }
      .card-text { font: 400 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #333333; }
      .label { font: 700 14px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #7b4b2a; letter-spacing: 1px; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="560" rx="24" fill="url(#bg)" />
  <text x="70" y="72" class="title">从网站能力到可复用 Skill</text>
  <text x="70" y="106" class="subtitle">先用浏览器学习能力，再切换到 API 完成真实执行。</text>

  <g transform="translate(62,190)">
    <rect x="0" y="0" width="170" height="210" rx="22" fill="#f0d8c1" />
    <text x="24" y="38" class="label">第 1 步</text>
    <text x="24" y="84" class="card-title">网站界面</text>
    <text x="24" y="118" class="card-text">菜单、表单、</text>
    <text x="24" y="142" class="card-text">筛选条件与</text>
    <text x="24" y="166" class="card-text">用户流程</text>
  </g>

  <g transform="translate(270,190)">
    <rect x="0" y="0" width="170" height="210" rx="22" fill="#d7e7d0" />
    <text x="24" y="38" class="label">第 2 步</text>
    <text x="24" y="84" class="card-title">能力映射</text>
    <text x="24" y="118" class="card-text">UI 路径、API、</text>
    <text x="24" y="142" class="card-text">请求结构与</text>
    <text x="24" y="166" class="card-text">响应结构</text>
  </g>

  <g transform="translate(478,190)">
    <rect x="0" y="0" width="170" height="210" rx="22" fill="#cfe2f0" />
    <text x="24" y="38" class="label">第 3 步</text>
    <text x="24" y="84" class="card-title">API 脚本</text>
    <text x="24" y="118" class="card-text">查询、上传、</text>
    <text x="24" y="142" class="card-text">重试、校验与</text>
    <text x="24" y="166" class="card-text">分析</text>
  </g>

  <g transform="translate(686,190)">
    <rect x="0" y="0" width="170" height="210" rx="22" fill="#f2d9e7" />
    <text x="24" y="38" class="label">第 4 步</text>
    <text x="24" y="84" class="card-title">鉴权缓存</text>
    <text x="24" y="118" class="card-text">~/.domain-</text>
    <text x="24" y="142" class="card-text">auth.yaml，</text>
    <text x="24" y="166" class="card-text">失败后刷新</text>
  </g>

  <g transform="translate(894,190)">
    <rect x="0" y="0" width="170" height="210" rx="22" fill="#ead9c7" />
    <text x="24" y="38" class="label">第 5 步</text>
    <text x="24" y="84" class="card-title">可复用 Skill</text>
    <text x="24" y="118" class="card-text">SKILL.md、</text>
    <text x="24" y="142" class="card-text">README、脚本</text>
    <text x="24" y="166" class="card-text">和参考文档</text>
  </g>

  <line x1="235" y1="295" x2="265" y2="295" stroke="#2b2b2b" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="443" y1="295" x2="473" y2="295" stroke="#2b2b2b" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="651" y1="295" x2="681" y2="295" stroke="#2b2b2b" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="859" y1="295" x2="889" y2="295" stroke="#2b2b2b" stroke-width="4" marker-end="url(#arrow)" />

  <g transform="translate(1074,190)">
    <rect x="0" y="0" width="144" height="210" rx="22" fill="#d7d9ee" />
    <text x="22" y="38" class="label">第 6 步</text>
    <text x="22" y="84" class="card-title">发布市场</text>
    <text x="22" y="118" class="card-text">上传或更新</text>
    <text x="22" y="142" class="card-text">到公司的</text>
    <text x="22" y="166" class="card-text">Skill 市场</text>
  </g>
</svg>
